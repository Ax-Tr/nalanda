services:
  # ─── Backend: Node.js / Express (ESM) ───────────────────────────────────────
  - type: web
    name: nalanda-backend
    runtime: node
    region: singapore           # change to: oregon, ohio, frankfurt if needed
    plan: free
    rootDir: nalanda-enterprise-training-platform/backend   # exact path in repo
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true            # redeploys on every git push to main

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 8080             # must match what your server listens on

      - key: JWT_SECRET
        generateValue: true     # Render auto-generates a secure random value

      - key: JWT_EXPIRES_IN
        value: 30m

      - key: CORS_ORIGIN
        value: https://nalandalms.netlify.app
