databases:
  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  - name: nalanda-db
    databaseName: nalanda_lms
    user: nalanda_user
    plan: free                  # Change to "starter" ($7/mo) for production
    region: singapore           # Change to your nearest: us-east, us-west, eu-west, ap-southeast

services:
  # ─── Backend: Node.js / Express ─────────────────────────────────────────────
  - type: web
    name: nalanda-backend
    runtime: node
    region: singapore           # Must match database region above
    plan: free                  # Change to "starter" for production
    rootDir: backend            # Folder name of your backend in the repo
    buildCommand: npm install
    startCommand: node server.js   # Change to: node index.js / npm start — whatever starts your server
    healthCheckPath: /api/health   # Render pings this to confirm your server is alive
    autoDeploy: true               # Auto-redeploy when you push to GitHub
    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 5000

      # Auto-injected by Render from the database above — do NOT set manually
      - key: DATABASE_URL
        fromDatabase:
          name: nalanda-db
          property: connectionString

      # Render auto-generates a secure random value for this
      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRES_IN
        value: 15m

      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

      # Your Netlify frontend URL — for CORS
      - key: FRONTEND_URL
        value: https://nalandalms.netlify.app

      - key: BCRYPT_SALT_ROUNDS
        value: 12
