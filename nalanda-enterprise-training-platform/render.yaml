databases:
  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  - name: nalanda-db
    databaseName: nalanda_lms
    user: nalanda_user
    plan: free          # upgrade to "starter" ($7/mo) for always-on production
    region: singapore   # options: oregon, ohio, virginia, frankfurt, singapore

services:
  # ─── Backend: Node.js / Express ─────────────────────────────────────────────
  - type: web
    name: nalanda-backend
    runtime: node
    region: singapore             # must match database region above
    plan: free
    rootDir: backend              # Render runs all commands from inside /backend
    buildCommand: npm install     # installs backend/package.json dependencies
    startCommand: node server.js  # entry point: backend/server.js
    healthCheckPath: /api/health  # Render pings this to confirm server is alive
    autoDeploy: true              # redeploys on every git push to main

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 5000

      # Auto-injected from the nalanda-db above — do NOT set this manually
      - key: DATABASE_URL
        fromDatabase:
          name: nalanda-db
          property: connectionString

      # Render auto-generates a secure random value for JWT signing
      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRES_IN
        value: 15m

      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

      - key: BCRYPT_SALT_ROUNDS
        value: 12

      # Netlify frontend URL — used in CORS to allow requests from the frontend
      - key: FRONTEND_URL
        value: https://nalandalms.netlify.app
