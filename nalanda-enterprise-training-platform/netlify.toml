# netlify.toml
# Lives at the ROOT of your repo — already there per your tree ✅
# Frontend (Vite + React + TS) is ALSO at the root (src/, index.html, vite.config.ts)

[build]
  command = "npm run build"   # runs vite build using root package.json
  publish = "dist"            # Vite outputs to /dist at the root

[build.environment]
  NODE_VERSION = "18"         # Node 18 LTS — stable for Vite + TypeScript builds

# ─── SPA Routing Fix ──────────────────────────────────────────────────────────
# Without this, refreshing any page other than "/" gives a 404 on Netlify.
# This tells Netlify to always serve index.html and let React Router handle routing.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Security Headers ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
