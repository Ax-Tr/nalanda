<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="silverH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8"/>
      <stop offset="20%" style="stop-color:#d4d4d4"/>
      <stop offset="45%" style="stop-color:#f0f0f0"/>
      <stop offset="70%" style="stop-color:#b8b8b8"/>
      <stop offset="100%" style="stop-color:#d0d0d0"/>
    </linearGradient>
    <linearGradient id="silverFingers" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ddd"/>
      <stop offset="40%" style="stop-color:#f5f5f5"/>
      <stop offset="100%" style="stop-color:#bbb"/>
    </linearGradient>
    <filter id="handShadow">
      <feDropShadow dx="0.5" dy="1" stdDeviation="0.6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#handShadow)">
    <!-- Index finger (pointing) -->
    <rect x="10" y="1" width="5" height="14" rx="2.5" fill="url(#silverFingers)" stroke="#999" stroke-width="0.4"/>
    <!-- Middle finger -->
    <rect x="16" y="5" width="4.5" height="10" rx="2.2" fill="url(#silverFingers)" stroke="#999" stroke-width="0.4"/>
    <!-- Ring finger -->
    <rect x="21" y="6" width="4.2" height="9" rx="2.1" fill="url(#silverFingers)" stroke="#999" stroke-width="0.4"/>
    <!-- Pinky -->
    <rect x="25.5" y="8" width="3.8" height="7" rx="1.9" fill="url(#silverFingers)" stroke="#999" stroke-width="0.4"/>
    <!-- Thumb -->
    <rect x="4" y="12" width="4.5" height="9" rx="2.2" fill="url(#silverFingers)" stroke="#999" stroke-width="0.4" transform="rotate(-25 6 16)"/>
    <!-- Palm -->
    <rect x="8" y="14" width="22" height="10" rx="4" fill="url(#silverH)" stroke="#999" stroke-width="0.4"/>
    <!-- Wrist -->
    <rect x="10" y="23" width="16" height="7" rx="3" fill="url(#silverH)" stroke="#999" stroke-width="0.4"/>
    <!-- Highlight on palm -->
    <rect x="12" y="15" width="14" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
    <!-- Knuckle line -->
    <line x1="10" y1="15" x2="28" y2="15" stroke="#aaa" stroke-width="0.3" opacity="0.5"/>
  </g>
</svg>
