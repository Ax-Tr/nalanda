<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8"/>
      <stop offset="25%" style="stop-color:#c0c0c0"/>
      <stop offset="50%" style="stop-color:#f5f5f5"/>
      <stop offset="75%" style="stop-color:#a8a8a8"/>
      <stop offset="100%" style="stop-color:#d0d0d0"/>
    </linearGradient>
    <linearGradient id="silverDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#888"/>
      <stop offset="50%" style="stop-color:#bbb"/>
      <stop offset="100%" style="stop-color:#666"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="0.5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Pen nib body - pointing top-left -->
  <g filter="url(#shadow)">
    <!-- Main nib shape -->
    <path d="M2 2 L12 6 L26 20 L22 24 L20 26 L6 12 Z" fill="url(#silver)" stroke="#777" stroke-width="0.5"/>
    <!-- Nib slit -->
    <line x1="2" y1="2" x2="14" y2="14" stroke="#666" stroke-width="0.6" opacity="0.7"/>
    <!-- Ink hole -->
    <circle cx="10" cy="10" r="1.2" fill="#555" stroke="#888" stroke-width="0.3"/>
    <!-- Highlight edge -->
    <path d="M3 3 L11 6.5 L5.5 11 Z" fill="rgba(255,255,255,0.3)"/>
    <!-- Bottom of nib -->
    <path d="M20 26 L22 24 L26 20 L28 22 L24 28 Z" fill="url(#silverDark)" stroke="#666" stroke-width="0.4"/>
  </g>
</svg>
